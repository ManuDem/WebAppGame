<!doctype html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>LUCrAre: SEMPRE</title>
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #071423;
      --bg-mid: #0f2235;
      --bg-accent: #17344a;
      --bg-sun: rgba(255, 198, 118, 0.22);
      --bg-moon: rgba(136, 204, 255, 0.22);
      --canvas-border: rgba(178, 219, 246, 0.86);
      --canvas-glow: rgba(135, 209, 255, 0.24);
      --app-pad-top: max(10px, env(safe-area-inset-top, 0px));
      --app-pad-right: max(10px, env(safe-area-inset-right, 0px));
      --app-pad-bottom: max(10px, env(safe-area-inset-bottom, 0px));
      --app-pad-left: max(10px, env(safe-area-inset-left, 0px));
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Sora', 'Trebuchet MS', sans-serif;
      background:
        radial-gradient(circle at 15% 12%, var(--bg-sun), transparent 50%),
        radial-gradient(circle at 86% 82%, var(--bg-moon), transparent 46%),
        linear-gradient(156deg, var(--bg-deep) 0%, var(--bg-mid) 58%, var(--bg-accent) 100%);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: var(--app-pad-top) var(--app-pad-right) var(--app-pad-bottom) var(--app-pad-left);
      position: relative;
    }

    @media (max-height: 430px) and (min-width: 720px) {
      #app {
        --app-pad-top: max(8px, env(safe-area-inset-top, 0px));
        --app-pad-right: max(10px, env(safe-area-inset-right, 0px));
        --app-pad-bottom: max(8px, env(safe-area-inset-bottom, 0px));
        --app-pad-left: max(10px, env(safe-area-inset-left, 0px));
      }
    }

    @media (min-width: 431px) and (min-height: 431px) {
      #app {
        --app-pad-top: max(16px, env(safe-area-inset-top, 0px));
        --app-pad-right: max(16px, env(safe-area-inset-right, 0px));
        --app-pad-bottom: max(16px, env(safe-area-inset-bottom, 0px));
        --app-pad-left: max(16px, env(safe-area-inset-left, 0px));
      }
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      max-width: 100%;
      max-height: 100%;
      border-radius: 14px;
      border: 1px solid var(--canvas-border);
      box-shadow:
        0 0 48px var(--canvas-glow),
        0 0 110px rgba(108, 173, 220, 0.16),
        0 26px 52px rgba(0, 0, 0, 0.56);
      display: block;
      image-rendering: auto;
      -webkit-font-smoothing: antialiased;
      font-smooth: always;
      transform: translateZ(0);
      touch-action: none;
    }

    /* Style the DOM input injected by Phaser's DOM container */
    input[type="text"] {
      font-family: 'Sora', 'Trebuchet MS', sans-serif !important;
      pointer-events: auto !important;
      user-select: text !important;
      -webkit-user-select: text !important;
      touch-action: manipulation !important;
      color: #163547 !important;
      -webkit-text-fill-color: #163547 !important;
      caret-color: #163547 !important;
      line-height: 1.2 !important;
    }

    input[type="text"]::placeholder {
      color: #4b6377;
      opacity: 1;
    }

    input[type="text"]:-webkit-autofill,
    input[type="text"]:-webkit-autofill:hover,
    input[type="text"]:-webkit-autofill:focus {
      -webkit-text-fill-color: #163547 !important;
      box-shadow: 0 0 0 1000px #f5faff inset !important;
      transition: background-color 9999s ease-in-out 0s;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <div id="ui-root" aria-hidden="true"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
